services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: sheets
    ports:
      - "8011:8011"
    volumes:
      - ./backend:/app
      - ./backend/secrets:/app/secrets:ro
      - koord_db:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8011 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: sheets
    volumes:
      - ./backend:/app
      - ./backend/secrets:/app/secrets:ro
      - koord_db:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: rq worker sheets --url redis://redis:6379/0

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8010:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # В .env на сервере: VITE_API_URL=http://ВАШ_IP:8011 — иначе браузер шлёт запросы на localhost
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8011}
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  redis_data:
  koord_db:
